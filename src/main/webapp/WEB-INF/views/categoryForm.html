<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 등록</title>
    <style>
        body {
            font-family: 'Malgun Gothic', Arial, sans-serif;
            width: 600px;
            margin: 30px auto;
        }

        h1 {
            border-bottom: 1px solid #999;
            padding-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 6px;
        }

        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        .error {
            color: red;
            font-size: 13px;
        }

        .btn {
            display: inline-block;
            padding: 7px 12px;
            border: 1px solid #777;
            background-color: #f1f1f1;
            color: #222;
            text-decoration: none;
            margin-bottom: 15px;
        }

        button {
            margin-top: 12px;
            padding: 7px 15px;
        }

        footer {
            margin-top: 30px;
            border-top: 1px solid #ddd;
            padding-top: 10px;
            font-size: 13px;
            color: #555;
        }
    </style>
</head>
<body>

<h1>카테고리 등록</h1>

<a class="btn" th:href="@{/categories}">목록으로</a>

<!-- 카테고리 등록 폼 -->
<form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
    <p>
        <label for="name">카테고리 이름</label>
        <input type="text" th:field="*{name}" placeholder="카테고리 이름 입력">
        <span class="error" th:errors="*{name}">오류 메시지</span>
    </p>

    <button type="submit">등록</button>
</form>

<footer>
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2171062 | 성명: 김준현'}"></p>
</footer>

</body>
</html>
